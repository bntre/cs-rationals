<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rationals Explorer</title>
    <link rel="icon" type="image/png" href="favicon.png" />

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css?v=2" rel="stylesheet" />

    <link rel="stylesheet" href="css/app.css" />

    <!-- temporarily removing
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- !!! The include triggers "The AudioContext was not allowed to start..": https://github.com/Tonejs/Tone.js/issues/443 -->
</head>

<body>

    <script>
        // Prevent the default browser zoom
        window.addEventListener('wheel', function (e) {
            if (e.ctrlKey) e.preventDefault();
        }, { passive: false });

        // Exporting a preset or an image
        window.downloadFileFromByteArray = (fileName, contentType, byteBase64) => {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = `data:${contentType};base64,${byteBase64}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>

    <script>
        // Playing note - called from C#
        /*
        function playNote() {}
        */

        // https://tonejs.github.io/docs/latest/classes/PolySynth.html
        const synth = new Tone.PolySynth().toDestination();
        synth.maxPolyphony = 64; // default 32
        synth.set({ oscillator: { type: "sine" } });

        async function playNote(label, partialsCount, freqs, durations, levels) {
            //console.log("playNote", partialsCount, freqs, durations, levels);
            console.log("playNote:", label);
            if (Tone.context.state !== 'running') {
                await Tone.start();
            }
            for (let i = 0; i < partialsCount; ++i) {
                //console.log("triggerAttackRelease", freqs[i], durations[i], undefined, levels[i]);
                synth.triggerAttackRelease(freqs[i], durations[i], undefined, levels[i]);
            }
        }
    </script>

    <div id="app" />

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js?v=2"></script>
</body>

</html>
